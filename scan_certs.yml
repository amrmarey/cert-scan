---
- name: TLS Certificate Inventory Scan
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    asset_list_file: "{{ playbook_dir }}/asset_list.txt"
    default_port: 443
    connect_timeout: 3
    output_dir: "{{ playbook_dir }}/output"
    report_path: "{{ output_dir }}/cert_scan_{{ now(fmt='%Y%m%d_%H%M%S') }}.csv"

  tasks:
    - name: Ensure output directory exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Read asset list
      ansible.builtin.slurp:
        src: "{{ asset_list_file }}"
      register: asset_list_raw

    - name: Parse asset entries
      ansible.builtin.set_fact:
        assets: >-
          {{ (asset_list_raw.content | b64decode).splitlines()
             | parse_asset_list(default_port) }}

    - name: Retrieve TLS certificate for each asset
      community.crypto.get_certificate:
        host: "{{ item.address }}"
        port: "{{ item.port }}"
        timeout: "{{ connect_timeout }}"
        asn1_base64: true
      loop: "{{ assets }}"
      loop_control:
        label: "{{ item.address }}:{{ item.port }}"
      register: cert_results
      ignore_errors: true

    - name: Parse certificate details for SAN extraction
      community.crypto.x509_certificate_info:
        content: "{{ item.cert }}"
      loop: "{{ cert_results.results }}"
      loop_control:
        label: "{{ item.item.address }}:{{ item.item.port }}"
      when: not (item.failed | bool)
      register: cert_info_results

    - name: Write CSV report
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/cert_report.csv.j2"
        dest: "{{ report_path }}"

    - name: Show output path
      ansible.builtin.debug:
        msg: "Report saved to: {{ report_path }}"
